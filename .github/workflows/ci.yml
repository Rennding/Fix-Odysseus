name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # This repo ships as the pipeline scaffold with no app code. Every step below
      # is guarded: it is a no-op while a path is absent, and enforces the gate once
      # the Odysseus fork is merged in. CI stays green on the scaffold and becomes a
      # real gate automatically when the code lands. (Local gate runs node --check on
      # the changed JS file; CI checks every static/js file for robustness.)

      - name: Install backend dependencies (if present)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt yet (scaffold-only); skipping install."
          fi
          if [ -d tests ] || ls test_*.py >/dev/null 2>&1; then
            pip install pytest
          fi

      - name: Compile backend (py_compile)
        run: |
          files=""
          [ -f app.py ] && files="$files app.py"
          for f in routes/*.py src/*.py; do
            [ -e "$f" ] && files="$files $f"
          done
          if [ -n "$files" ]; then
            echo "Compiling:$files"
            python -m py_compile $files
          else
            echo "No backend Python yet (scaffold-only); skipping py_compile."
          fi

      - name: Run tests (pytest)
        run: |
          if [ -d tests ] || ls test_*.py >/dev/null 2>&1; then
            python -m pytest
          else
            echo "No tests yet (scaffold-only); skipping pytest."
          fi

      - name: Syntax-check frontend (node --check)
        run: |
          if ls static/js/*.js >/dev/null 2>&1; then
            rc=0
            for f in static/js/*.js; do
              echo "node --check $f"
              node --check "$f" || rc=1
            done
            exit $rc
          else
            echo "No static/js yet (scaffold-only); skipping node --check."
          fi
